<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>zeadanne</title>

  <link rel="icon" type="image/png" href="/favicon.png">

  <meta property="og:title" content="zeadanne">
  <meta property="og:description" content="!!">
  <meta property="og:image" content="https://zeadanne.com/preview.png">
  <meta property="og:url" content="https://zeadanne.com">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-family: sans-serif;
      overflow: hidden; 
    }

  
    #video-fondo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover; 
      z-index: -1;
    }

    
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 0;
    }

    
    .container {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 30px;
    }

    a {
      color: white;
      font-size: 40px;
      transition: 0.3s ease;
      text-decoration: none;
    }

    a:hover {
      color: #ffffff;
      transform: scale(1.2);
    }

    @media (max-width: 600px) {
      .container {
        gap: 20px;
        flex-wrap: wrap;
      }
      a {
        font-size: 34px;
      }
    }
  </style>
</head>

<body>

  <video autoplay muted loop playsinline id="video-fondo">
    <source src=".video.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="container">
    <a href="https://soundcloud.com/zeadanne" target="_blank"><i class="fab fa-soundcloud"></i></a>
    <a href="https://bandcamp.com/zeadanne" target="_blank"><i class="fab fa-bandcamp"></i></a>
    <a href="https://youtube.com/@zeadanne" target="_blank"><i class="fab fa-youtube"></i></a>
    <a href="https://instagram.com/zeadanne" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="https://facebook.com/zeadanne" target="_blank"><i class="fab fa-facebook"></i></a>
  </div>

</body>
</html>
